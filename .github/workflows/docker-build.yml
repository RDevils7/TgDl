name: Build Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tdl_version:
        description: 'tdl version (e.g. 0.18.5, default: latest)'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64 only, export tar)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: tg-dl:latest
          build-args: |
            TDL_VERSION=${{ github.event.inputs.tdl_version || 'latest' }}

      - name: Export image to tar
        run: |
          docker save tg-dl:latest > /tmp/tg-dl-image.tar
          ls -lh /tmp/tg-dl-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: tg-dl-docker-image
          path: /tmp/tg-dl-image.tar
          retention-days: 7

      - name: Print summary
        run: |
          echo "## Docker Image Built ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | \`linux/amd64, linux/arm64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact** | \`tg-dl-docker-image.tar\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Retention** | 7 days |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to use:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Download from Artifacts section below" >> $GITHUB_STEP_SUMMARY
          echo "# Then load into Docker:" >> $GITHUB_STEP_SUMMARY
          echo "docker load < tg-dl-docker-image.tar" >> $GITHUB_STEP_SUMMARY
          echo "docker images | grep tg-dl" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
