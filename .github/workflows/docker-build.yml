name: 构建 Docker 镜像

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建镜像 (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: tg-dl:latest

      - name: 导出镜像为 tar 包
        run: |
          docker save tg-dl:latest > tg-dl-image.tar
          ls -lh tg-dl-image.tar

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tg-dl-docker-image
          path: tg-dl-image.tar
          retention-days: 7
