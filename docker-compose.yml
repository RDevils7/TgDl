# ============================================================
# TG-DL Docker Compose 部署
# 一键启动 Telegram 文件下载服务
#
# 使用方法：
#   docker compose up -d          # 后台启动
#   docker compose down            # 停止并删除容器
#   docker compose logs -f         # 查看实时日志
# ============================================================

services:
  tg-dl:
    build: .
    container_name: tg-dl
    restart: unless-stopped
    ports:
      - "${TG_DL_PORT:-3210}:3210"
    environment:
      - NODE_ENV=production
      - PORT=3210
      - TDL_PATH=/usr/local/bin/tdl
      # ---- 路径配置（可按需修改）----
      - DOWNLOAD_DIR=/app/downloads
      - CONFIG_FILE=/app/data/config.json
      # ---- 代理配置（可选，取消注释后填入你的代理信息）----
      # - PROXY_HOST=127.0.0.1
      # - PROXY_PORT=7890
      # - PROXY_PROTOCOL=http
    volumes:
      # tdl 登录 session 和数据（重要！登录态持久化）
      - tdl-data:/root/.tdl
      # 下载文件存储
      - downloads:/app/downloads
      # 应用配置（代理设置、登录状态等）
      - config-data:/app/data
    # 可选：限制资源使用
    deploy:
      resources:
        limits:
          memory: 512M

# 命名卷（数据持久化）
volumes:
  tdl-data:
    name: tg-dl-tdl-data
    driver: local
  downloads:
    name: tg-dl-downloads
    driver: local
  config-data:
    name: tg-dl-config
    driver: local
