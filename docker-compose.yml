# ============================================================
# TG-DL Docker Compose - NAS 部署配置
#
# 使用方法：
#   docker compose up -d --build          # 构建并启动
#   docker compose down                   # 停止
#   docker compose logs -f                # 查看日志
#   docker compose exec tg-dl bash        # 进入容器
#
# NAS 群晖/威联通/UNRAID 通用
# ============================================================

services:
  tg-dl:
    build:
      context: .
      dockerfile: Dockerfile
      # 如需指定 tdl 版本，取消注释：
      # args:
      #   TDL_VERSION: "0.18.5"
    container_name: tg-dl
    restart: unless-stopped
    ports:
      - "${TG_DL_PORT:-3210}:3210"
    environment:
      # ---- 基础配置 ----
      - NODE_ENV=production
      - PORT=3210
      - TDL_PATH=/usr/local/bin/tdl
      - DOWNLOAD_DIR=/app/downloads
      - CONFIG_FILE=/app/data/config.json
      # ---- 时区（重要！影响日志时间显示）----
      - TZ=Asia/Shanghai
      # ---- 网络代理（NAS 访问 Telegram 必须配代理）----
      # 取消注释并填入你的代理信息：
      # - PROXY_HOST=192.168.1.100       # 代理地址（宿主机 IP 或内网代理）
      # - PROXY_PORT=7890                 # 代理端口
      # - PROXY_PROTOCOL=http             # http / https / socks5
      # - PROXY_USERNAME=
      # - PROXY_PASSWORD=
    volumes:
      # ===== 数据持久化（容器删除不丢失）=====
      # 1. tdl 登录 session 和用户数据
      - tdl-data:/root/.tdl
      # 2. 下载的文件
      - downloads:/app/downloads
      # 3. 应用配置（代理设置、登录状态等）
      - config-data:/app/data

      # ===== 可选：使用宿主机目录挂载（替代命名卷）=====
      # 如果你想直接在 NAS 文件系统中看到下载文件，
      # 注释上面的 downloads 卷，改用下面的绑定挂载：
      # - /volume1/docker/tg-dl/downloads:/app/downloads
      # - /volume1/docker/tg-dl/config:/app/data
      # - /volume1/docker/tg-dl/tdl-data:/root/.tdl

    # 资源限制（根据 NAS 性能调整）
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2.0'

# ===== 命名卷（数据存储在 Docker 管理目录）=====
# 查看卷位置: docker volume inspect tg-dl-downloads
volumes:
  tdl-data:
    name: tg-dl-tdl-data
    driver: local
  downloads:
    name: tg-dl-downloads
    driver: local
  config-data:
    name: tg-dl-config
    driver: local
